<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chris Kleiner</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  background-image: url("./Hintergrund.png");
  background-size: cover;
  background-position: center;

  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  color: white;
  text-align: center;

  filter: brightness(1.1);
}

.container {
  backdrop-filter: blur(6px);
  background: rgba(0, 0, 0, 0.65);
  border-radius: 20px;
  padding: 30px 20px;
  max-width: 400px;
  width: 100%;
}

.profile {
  width: 160px;
  margin: 0 auto 20px auto;
  border-radius: 25px;
  overflow: hidden;

  border: 2px solid rgba(255,215,0,0.4);
  box-shadow: 0 0 25px rgba(255,215,0,0.6);

  animation: float 3s ease-in-out infinite;
}

.profile img {
  width: 100%;
}

@keyframes float {
  50% { transform: translateY(-10px); }
}

h1 {
  color: #ffd700;
}

.link {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 12px auto;
  padding: 15px;

  background: rgba(0,0,0,0.65);
  border-radius: 12px;
  color: #ffd700;
  text-decoration: none;
  font-weight: bold;
}

.link:hover {
  transform: scale(1.05);
}

.footer {
  margin-top: 25px;
}
</style>
</head>

<body>

<div class="container">

  <div id="header"></div>

  <a class="link" href="#">
    <i class="fas fa-music"></i> Musik Einsenden
  </a>

  <a class="link" href="social-media.html">
    <i class="fas fa-share-alt"></i> Social Media
  </a>

  <div id="spotify"></div>

  <div id="footer"></div>

</div>

<script>
async function loadComponent(id, file) {
  const res = await fetch(file);
  const data = await res.text();
  document.getElementById(id).innerHTML = data;
}

loadComponent("header", "header.html");
loadComponent("footer", "footer.html");

document.getElementById("spotify").innerHTML =
  '<iframe src="https://open.spotify.com/embed/artist/7LBkwPXM2etkM4CMmiU3Ci" width="100%" height="80"></iframe>';
</script>

</body>
</html>
