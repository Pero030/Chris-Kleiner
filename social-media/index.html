<script>
// Auf Touch-Geräten (Handy/Tablet) target="_blank" entfernen
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.querySelectorAll('.grid .link').forEach(link => {
    link.removeAttribute('target');
  });
}
</script>
