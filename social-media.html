<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  background-image: url("./Hintergrund.png");
  background-size: cover;
  background-position: center;

  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;

  color: white;
  text-align: center;

  filter: brightness(1.1);
}

/* CONTAINER */
.container {
  backdrop-filter: blur(6px);
  background: rgba(0, 0, 0, 0.65);
  border-radius: 20px;
  padding: 30px 20px;
  max-width: 400px;
  width: 100%;
}

/* PROFILE (JETZT GLEICH WIE INDEX!) */
.profile {
  width: 160px;
  margin: 0 auto 20px auto;
  border-radius: 25px;
  overflow: hidden;

  border: 2px solid rgba(255,215,0,0.4);

  box-shadow: 
    0 0 25px rgba(255, 215, 0, 0.6),
    0 0 50px rgba(255, 215, 0, 0.4),
    0 0 80px rgba(255, 215, 0, 0.2);

  animation: float 3s ease-in-out infinite;
}

.profile img {
  width: 100%;
  display: block;
}

/* FLOAT ANIMATION */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

/* TITLE */
h1 {
  font-size: 42px;
  color: #ffd700;

  text-shadow: 
    0 0 10px rgba(255,215,0,0.8),
    0 0 30px rgba(255,215,0,0.5);
}

/* BUTTONS */
.link {
  display: flex;
  align-items: center;
  justify-content: center;

  margin: 12px auto;
  padding: 15px;

  background: rgba(0,0,0,0.65);
  border-radius: 12px;

  color: #ffd700;
  text-decoration: none;
  font-weight: bold;

  transition: 0.3s;
}

.link:hover {
  transform: scale(1.05);
}

/* HOVER COLORS */
.youtube:hover {
  background: #ff0000;
  color: white;
  box-shadow: 0 0 25px #ff0000;
}

.tiktok:hover {
  background: #111;
  color: #00f2ea;
  box-shadow: 0 0 25px #00f2ea;
}

.spotify:hover {
  background: #1db954;
  color: black;
  box-shadow: 0 0 25px #1db954;
}

.instagram:hover {
  background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
  color: white;
  box-shadow: 0 0 25px #dd2a7b;
}

.upload:hover {
  background: #ffd700;
  color: black;
  box-shadow: 0 0 25px #ffd700;
}

/* FOOTER */
.footer {
  margin-top: 25px;
}
</style>
</head>

<body>

<div class="container">

  <div id="header"></div>

  <a class="link youtube" href="https://youtube.com">
  <i class="fab fa-youtube"></i> YouTube
</a>

<a class="link tiktok" href="https://tiktok.com">
  <i class="fab fa-tiktok"></i> TikTok
</a>

<a class="link spotify" href="https://spotify.com">
  <i class="fab fa-spotify"></i> Spotify
</a>

<a class="link instagram" href="https://instagram.com">
  <i class="fab fa-instagram"></i> Instagram
</a>

<a class="link" href="index.html">
  ← Zurück
</a>

  <div id="footer"></div>

</div>

<script>
async function loadComponent(id, file) {
  const res = await fetch(file);
  const data = await res.text();
  document.getElementById(id).innerHTML = data;
}

loadComponent("header", "header.html");
loadComponent("footer", "footer.html");
</script>

</body>
</html>
