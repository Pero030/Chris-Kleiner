<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background-image: url("./Hintergrund.png");
  background-size: cover;

  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;

  color: white;
  text-align: center;
}

.container {
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.65);
  padding: 30px;
  border-radius: 20px;
  width: 400px;
}

.link {
  display: block;
  margin: 10px;
  padding: 15px;
  background: rgba(0,0,0,0.65);
  color: #ffd700;
  text-decoration: none;
  border-radius: 12px;
}

.footer {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

  <div id="header"></div>

  <a class="link" href="https://youtube.com">YouTube</a>
  <a class="link" href="https://tiktok.com">TikTok</a>
  <a class="link" href="https://spotify.com">Spotify</a>
  <a class="link" href="https://instagram.com">Instagram</a>

  <a class="link" href="index.html">← Zurück</a>

  <div id="footer"></div>

</div>

<script>
async function loadComponent(id, file) {
  const res = await fetch(file);
  const data = await res.text();
  document.getElementById(id).innerHTML = data;
}

loadComponent("header", "header.html");
loadComponent("footer", "footer.html");
</script>

</body>
</html>
