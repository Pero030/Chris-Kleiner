<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media | Chris Kleiner</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  background-image: url("./Hintergrund.png");
  background-size: cover;
  background-position: center;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
  color: white;
  text-align: center;

  filter: brightness(1.1);
}

/* CONTAINER */
.container {
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.65);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);

  padding: 30px 20px;
  max-width: 400px;
  width: 100%;
}

/* TITLE */
h1 {
  color: #ffd700;
  font-size: 38px;
  margin-bottom: 20px;

  text-shadow: 0 0 20px rgba(255,215,0,0.6);
}

/* LINKS */
.link {
  display: flex;
  align-items: center;
  justify-content: center;

  margin: 12px auto;
  padding: 15px;

  background: rgba(0,0,0,0.65);
  border-radius: 12px;

  text-decoration: none;
  color: #ffd700;
  font-weight: bold;

  transition: 0.3s;
}

.link i {
  margin-right: 10px;
}

/* HOVER */
.link:hover {
  transform: scale(1.05);
}

/* PLATFORM COLORS */
.youtube:hover {
  background: #ff0000;
  color: white;
  box-shadow: 0 0 25px #ff0000;
}

.tiktok:hover {
  background: #111;
  color: #00f2ea;
  box-shadow: 0 0 25px #00f2ea;
}

.spotify:hover {
  background: #1db954;
  color: black;
  box-shadow: 0 0 25px #1db954;
}

.instagram:hover {
  background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
  color: white;
  box-shadow: 0 0 25px #dd2a7b;
}

/* BACK BUTTON */
.back {
  margin-top: 20px;
  display: inline-block;
  color: #ffd700;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

  <h1>Social Media</h1>

  <a class="link youtube" href="https://www.youtube.com/@chriskleinermusic">
    <i class="fab fa-youtube"></i> YouTube
  </a>

  <a class="link tiktok" href="https://www.tiktok.com/@chriskleinermusic">
    <i class="fab fa-tiktok"></i> TikTok
  </a>

  <a class="link spotify" href="https://open.spotify.com/artist/7LBkwPXM2etkM4CMmiU3Ci">
    <i class="fab fa-spotify"></i> Spotify
  </a>

  <a class="link instagram" href="https://www.instagram.com/chriskleinermusic/">
    <i class="fab fa-instagram"></i> Instagram
  </a>

  <a class="back" href="index.html">
    ← Zurück
  </a>

</div>

</body>
</html>
